name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
          body: |
            ## Install

            | File | Description |
            |------|-------------|
            | `Tokenmeter Setup *.exe` | Installer — wizard, Desktop + Start Menu shortcuts |
            | `Tokenmeter *.exe` | Portable — run from anywhere, no install needed |

            > **Windows SmartScreen:** click **More info → Run anyway** on first launch (app is unsigned).

            **Requirements:** Windows 10/11 x64 · [Claude Code](https://claude.ai/code) installed
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
